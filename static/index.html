<!DOCTYPE html>
<html>
<head>
    <title>성경 PPT 생성기_made by NAYO</title>
    <style>
        /* 스타일링 */
        body { font-family: Arial, sans-serif; }
        input, button { margin: 5px; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR&display=swap" rel="stylesheet">
</head>
    <body style="
    margin:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #f5f5f5, #e0e0e0);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
">

<div style="
    background:white;
    padding:40px;
    border-radius:20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    width:320px;
    display:flex;
    flex-direction:column;
    align-items:center;
">

    <h2 style="margin-bottom:20px; text-align:center;">
        성경 PPT 생성기
    </h2>
    <div style="width:100%; margin-bottom:10px;">
    <span style="font-size:14px;">성경 버전</span>
    <select id="version" style="
        width:100%;
        padding:10px;
        border-radius:10px;
        margin-top:5px;
    ">
        <option value="개역개정">개역개정</option>
        <option value="개역한글">개역한글</option>
    </select>
</div>

    <input type="text" id="bibleVerse" placeholder="예: 에스겔 40:1-4" style="
        width:100%;
        text-align:center;
        padding:10px;
        margin-bottom:50px;
        border-radius:10px;
        border:1px solid #ccc;
        text-align:center;
    ">

    <input type="number" id="fontSize" value="45" style="
        width:100%;
        text-align:center;
        padding:10px;
        margin-bottom:10px;
        border-radius:10px;
        border:1px solid #ccc;
    ">

    <select id="fontFamily" style="
        width:100%;
        text-align:center;
        padding:10px;
        margin-bottom:10px;
        border-radius:10px;
    ">
        <option value="'Noto Serif KR', serif">Serif</option>
        <option value="Arial, sans-serif">Sans</option>
    </select>

    <label style="display:block; margin-bottom:15px;">
        <input type="checkbox" id="boldToggle" checked> Bold
    </label>

    <div style="
    width:100%;
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:10px;
">
    <span style="font-size:14px;">배경 색상</span>
    <input type="color" id="bgColor" value="#ffffff">
</div>

<div style="
    width:100%;
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:10px;
">
    <span style="font-size:14px;">글자 색상</span>
    <input type="color" id="fontColor" value="#000000">
</div>

<button id="generateSlides" style="
        width:100%;
        text-align:center;
        padding:12px;
        border:none;
        border-radius:10px;
        background:#333;
        color:white;
        font-size:16px;
        cursor:pointer;
    ">
        슬라이드 보기
    </button>

    <button id="downloadPPT" style="
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#666;
    color:white;
    font-size:16px;
    cursor:pointer;
    margin-top:10px;
">
    PPT 저장
</button>

</div>

    <script defer src="/static/script.js"></script>
</html>
